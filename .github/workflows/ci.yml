# Название нашего CI/CD пайплайна. Оно будет отображаться в интерфейсе GitHub.
name: API Tests CI/CD Pipeline

# Триггеры: когда запускать этот пайплайн.
on:
  # Запускать при отправке кода (push) в ветку 'main'.
  push:
    branches: [ "main" ]
  # Запускать при создании Pull Request в ветку 'main'.
  pull_request:
    branches: [ "main" ]

# Задачи (jobs), которые будут выполняться.
jobs:
  # Название нашей единственной задачи.
  run-api-tests:
    # Указываем, на какой виртуальной машине запускать. 'ubuntu-latest' - стандартный и надежный выбор.
    runs-on: ubuntu-latest

    # Шаги (steps), которые будут выполнены последовательно.
    steps:
      # Шаг 1: Скачиваем наш код из репозитория на виртуальную машину.
      # 'uses' означает использование готового экшена от сообщества.
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Шаг 2: Запускаем все наше окружение и тесты одной командой.
      - name: Run Docker Compose
        # 'run' означает выполнение команды в терминале виртуальной машины.
        # Это та же команда, что и у вас локально!
        # --exit-code-from tests - САМЫЙ ВАЖНЫЙ флаг. Он говорит CI, что если контейнер 'tests'
        # завершится с ошибкой (code 1), то весь шаг должен считаться проваленным.
        run: docker-compose up --build --exit-code-from tests

      # Шаг 3: Сохраняем результаты тестов (артефакты).
      # Этот шаг выполнится ВСЕГДА (даже если тесты упали), чтобы мы могли скачать отчет и посмотреть, что пошло не так.
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Имя артефакта, который мы сможем скачать.
          name: allure-results
          # Путь к папке, которую нужно сохранить.
          path: target/allure-results